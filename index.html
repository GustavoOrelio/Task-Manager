<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Primeiro App React</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div id="app"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    function Header(props) {
      return <h1 className="header">{props.children}</h1>
    }

    function App() {
      const [message, setMessage] = React.useState(["Tarefa 1", "Tarefa 2", "Tarefa 3"])
      const [inputValue, setInputValue] = React.useState("")

      function handleButtonClick() {
        setMessage([...message, inputValue]);
      }

      return (
        <div>
          <Header>Adicionar Tarefa</Header>

          <input type="text" placeholder="Digite sua tarefa" value={inputValue} className="input" onChange={(e) => { setInputValue(e.target.value) }} />

          <button className="button" onClick={() => { handleButtonClick() }}>Adicionar Tarefa</button>

          <Header>Minhas Tarefas</Header>
          <ul>
            {message.map((item) => {
              return <li>{item}</li>
            })}
          </ul>
        </div>
      )
    }
    // JSX - JavaScript XML
    const app = document.getElementById("app");
    const root = ReactDOM.createRoot(app);
    root.render(<App />);
  </script>
</body>

</html>
